name: CI

on:
  push:
    branches:
      - main

  pull_request:

  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: false
        default: false

permissions:
  contents: read
  # Required to upload coverage data to GitHub Code Quality.
  code-quality: write

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    name: Tests (Ruby ${{ matrix.ruby }})
    strategy:
      fail-fast: true
      matrix:
        ruby: ['3.2', '3.3', '3.4', '3.5', '4.0']

    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the PR head commit (not the merge commit) so coverage
          # line numbers map correctly to the diff for GitHub Code Quality.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run RSpec tests
        # Generate a Cobertura coverage report on a single Ruby version only.
        env:
          COVERAGE: ${{ matrix.ruby == '3.4' && 'true' || '' }}
        run: bundle exec rspec

      - name: Run Rhales-specific tests
        run: bundle exec rake rhales:test

      - name: Upload coverage report
        # Only the coverage-generating version uploads; skip forked PRs, which
        # cannot write Code Quality data.
        if: matrix.ruby == '3.4' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/upload-code-coverage@v1
        with:
          file: coverage/coverage.xml
          language: Ruby
          label: code-coverage/rspec

  gem-build:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    name: Gem Build Test (Ruby ${{ matrix.ruby }})
    strategy:
      fail-fast: true
      matrix:
        ruby: ['3.2', '3.3', '3.4', '3.5', '4.0']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Build gem
        run: gem build rhales.gemspec

      - name: Install gem locally
        run: gem install rhales-*.gem

      - name: Test gem installation
        run: ruby -e "require 'rhales'; puts Rhales::VERSION"

  template-validation:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    name: Template Validation (Ruby ${{ matrix.ruby }})
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.2', '3.3', '3.4', '3.5', '4.0']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Validate example templates
        run: bundle exec rake rhales:validate

  demo-integration:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    name: Demo Integration (Ruby ${{ matrix.ruby }})
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.2', '3.3', '3.4', '3.5', '4.0']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Install demo dependencies
        working-directory: demo/rhales-roda-demo
        run: bundle install

      - name: Test demo app startup
        working-directory: demo/rhales-roda-demo
        run: |
          timeout 30s bundle exec rackup -p 9393 &
          sleep 5
          curl -f http://localhost:9393/ || exit 1
          pkill -f rackup || true
